services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: reservas-db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reservas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-reservas_pousada}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reservas} -d ${POSTGRES_DB:-reservas_pousada}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Express + TypeScript)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reservas-backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-reservas}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-reservas_pousada}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: https://api-pousada.pgdev.com.br
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      CORS_ORIGIN: https://minhapousada.pgdev.com.br
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CPF_ENCRYPTION_KEY: ${CPF_ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.reservas-api.entrypoints=https"
      - "traefik.http.routers.reservas-api.rule=Host(`api-pousada.pgdev.com.br`)"
      - "traefik.http.routers.reservas-api.tls=true"
      - "traefik.http.routers.reservas-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.reservas-api.middlewares=reservas-api-security@docker,global-ratelimit@file,strip-server-header@file"
      - "traefik.http.services.reservas-api.loadbalancer.server.port=4000"
      # Security Headers (OBRIGATORIO)
      - "traefik.http.middlewares.reservas-api-security.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.reservas-api-security.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.reservas-api-security.headers.stsPreload=true"
      - "traefik.http.middlewares.reservas-api-security.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.reservas-api-security.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.reservas-api-security.headers.browserXssFilter=true"
      - "traefik.http.middlewares.reservas-api-security.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.reservas-api-security.headers.frameDeny=true"
      - "traefik.http.middlewares.reservas-api-security.headers.contentSecurityPolicy=default-src 'none'; frame-ancestors 'none'"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api-pousada.pgdev.com.br
        NEXT_PUBLIC_APP_URL: https://minhapousada.pgdev.com.br
    container_name: reservas-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pousada-frontend.entrypoints=https"
      - "traefik.http.routers.pousada-frontend.rule=Host(`minhapousada.pgdev.com.br`)"
      - "traefik.http.routers.pousada-frontend.tls=true"
      - "traefik.http.routers.pousada-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pousada-frontend.middlewares=pousada-frontend-security@docker,global-ratelimit@file,strip-server-header@file"
      - "traefik.http.services.pousada-frontend.loadbalancer.server.port=3000"
      # Security Headers (OBRIGATORIO)
      - "traefik.http.middlewares.pousada-frontend-security.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.pousada-frontend-security.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.pousada-frontend-security.headers.stsPreload=true"
      - "traefik.http.middlewares.pousada-frontend-security.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.pousada-frontend-security.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.pousada-frontend-security.headers.browserXssFilter=true"
      - "traefik.http.middlewares.pousada-frontend-security.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.pousada-frontend-security.headers.frameDeny=true"
      - "traefik.http.middlewares.pousada-frontend-security.headers.contentSecurityPolicy=default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api-pousada.pgdev.com.br https://accounts.google.com; frame-ancestors 'none'"
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  proxy:
    external: true
  internal:
    driver: bridge

volumes:
  postgres_data:
    driver: local
